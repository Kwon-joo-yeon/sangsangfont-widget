<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상상토끼 폰틀리에 — AI 폰트 추천 & 미리보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Brush+Script&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #02bca7;
      --primary-dark: #019e8d;
      --bg: #ffffff;
      --bg-subtle: #f7fffe;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e0f5f3;
      --card-shadow: 0 2px 12px rgba(2, 188, 167, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    #fontelier-widget {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 헤더 */
    .widget-header {
      text-align: center;
      padding: 24px 0 16px;
    }
    .widget-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .widget-header h1 span { font-size: 1.6rem; }
    .widget-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* 사용 횟수 안내 */
    .usage-info {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .usage-info.warn { color: #e67e22; }
    .usage-info.exhausted { color: #dc2626; }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: none;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-btn:hover { color: var(--primary-dark); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 공통 입력 */
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .text-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary); }

    /* 태그 */
    .tags-section { margin-bottom: 16px; }
    .tags-section label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      transition: all 0.2s;
    }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tag-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* AI 추천 버튼 */
    .recommend-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .recommend-btn:hover { background: var(--primary-dark); }
    .recommend-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 추천 결과 */
    .results-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .result-cards { display: flex; flex-direction: column; gap: 16px; }
    .result-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--bg-subtle);
      box-shadow: var(--card-shadow);
    }
    .result-card .rank {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .result-card .font-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .result-card .font-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .result-card .preview-text {
      padding: 16px;
      background: #fff;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      min-height: 50px;
      line-height: 1.4;
    }
    .template-preview {
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .result-card .reason, .result-card .usage {
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .result-card .reason strong, .result-card .usage strong {
      color: var(--text-muted);
    }
    .buy-btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .buy-btn:hover { background: var(--primary-dark); }

    /* 에러 */
    .error-msg {
      padding: 16px;
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 16px;
    }

    /* 미리보기 탭 컨트롤 */
    .preview-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .preview-controls select,
    .preview-controls input[type="range"] {
      font-family: inherit;
    }
    .preview-controls select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      background: #fff;
    }
    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .range-wrap input[type="range"] {
      width: 100px;
      accent-color: var(--primary);
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .toggle-wrap input[type="checkbox"] { accent-color: var(--primary); }

    /* 폰트 목록 */
    .font-list { display: flex; flex-direction: column; gap: 12px; }
    .font-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      background: #fff;
      transition: box-shadow 0.2s;
    }
    .font-item:hover { box-shadow: var(--card-shadow); }
    .font-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .font-item-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .font-item-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .badge-category { background: var(--border); color: var(--primary-dark); }
    .badge-free { background: var(--primary); color: #fff; }
    .font-item-preview {
      margin: 8px 0;
      line-height: 1.4;
      word-break: keep-all;
    }
    .font-item-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .buy-btn-sm {
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .buy-btn-sm:hover { background: var(--primary-dark); }

    /* 반응형 */
    @media (max-width: 480px) {
      #fontelier-widget { padding: 12px; }
      .widget-header h1 { font-size: 1.2rem; }
      .result-cards { gap: 12px; }
      .result-card { padding: 14px; }
      .preview-controls { flex-direction: column; align-items: flex-start; }
      .range-wrap input[type="range"] { width: 140px; }
    }
  </style>
</head>

  <div id="fontelier-widget">
    <!-- 헤더 -->
    <div class="widget-header">
      <h1><span>🐰</span> 상상토끼 폰트 찾기</h1>
      <p>내게 맞는 폰트를 AI가 추천해드려요</p>
    </div>

    <!-- 남은 횟수 안내 -->
    <div class="usage-info" id="usageInfo"></div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('recommend')" aria-label="AI 추천 탭">🤖 AI 추천</button>
      <button class="tab-btn" onclick="switchTab('preview')" aria-label="미리보기 탭">🔤 미리보기</button>
    </div>

    <!-- Tab 1: AI 추천 -->
    <div class="tab-content active" id="tab-recommend">
      <div class="input-group">
        <label for="purposeInput">어떤 용도로 사용하실 건가요?</label>
        <input type="text" class="text-input" id="purposeInput" placeholder="예) 카페 메뉴판에 쓸 따뜻하고 감성적인 폰트">
      </div>

      <div class="tags-section">
        <label>분위기 (다중 선택)</label>
        <div class="tags-wrap" id="moodTags"></div>
      </div>

      <div class="tags-section">
        <label>용도 (다중 선택)</label>
        <div class="tags-wrap" id="useTags"></div>
      </div>

      <button class="recommend-btn" id="recommendBtn" onclick="getRecommendation()" aria-label="AI 추천 받기">
        🤖 AI 추천 받기
      </button>

      <div id="recommendResult"></div>
    </div>

    <!-- Tab 2: 미리보기 -->
    <div class="tab-content" id="tab-preview">
      <div class="input-group">
        <label for="previewInput">미리볼 문장을 입력하세요</label>
        <input type="text" class="text-input" id="previewInput" value="봄날의 따뜻한 햇살처럼" oninput="renderPreviewList()">
      </div>

      <div class="preview-controls">
        <select id="categoryFilter" onchange="renderPreviewList()" aria-label="카테고리 필터">
          <option value="전체">전체</option>
        </select>
        <div class="range-wrap">
          <label for="sizeSlider">크기:</label>
          <input type="range" id="sizeSlider" min="24" max="72" value="40" oninput="updateSize()">
          <span id="sizeValue">40px</span>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="freeToggle" onchange="renderPreviewList()">
          무료만 보기
        </label>
      </div>

      <div class="font-list" id="fontList"></div>
    </div>
  </div>

      if (text.includes("sns") || text.includes("인스타")) return TEMPLATES["SNS카드"];
      if (text.includes("청첩") || text.includes("초대") || text.includes("카드")) return TEMPLATES["청첩장"];

      if (text.includes("브랜") || text.includes("로고") || text.includes("패션")) return TEMPLATES["브랜딩"];
      if (text.includes("교육") || text.includes("학습") || text.includes("키즈")) return TEMPLATES["교육자료"];
      return TEMPLATES["기본"];
    }

    function drawTemplateCanvas(canvasId, font, template, mainText) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width = 420;
      const h = canvas.height = 260;

      // 배경
      template.bg(ctx, w, h);

      // 메인 텍스트
      const fontSize = template === TEMPLATES["웹툰"] ? 28 : 26;
      ctx.font = `bold ${fontSize}px '${font.previewFont}', sans-serif`;
      ctx.fillStyle = template.textColor;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const lines = wrapText(ctx, mainText, w - 80);
      const lineHeight = fontSize * 1.4;
      const startY = h * template.textY - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, i) => {
        ctx.fillText(line, w / 2, startY + i * lineHeight);
      });

      // 부제
      if (template.subText) {
        ctx.font = "13px 'Noto Sans KR', sans-serif";
        ctx.fillStyle = template.subColor;
        const subLines = template.subText.split("\n");
        subLines.forEach((line, i) => {
          ctx.fillText(line, w / 2, h * template.textY + 50 + i * 20);
        });
      }

      // 폰트명 워터마크
      ctx.font = "11px 'Noto Sans KR', sans-serif";
      ctx.fillStyle = template.subColor;
      ctx.globalAlpha = 0.6;
      ctx.textAlign = "right";
      ctx.fillText(`Font: ${font.name}`, w - 20, h - 14);
      ctx.globalAlpha = 1;
    }

    function wrapText(ctx, text, maxWidth) {
      const chars = text.split("");
      const lines = [];
      let current = "";
      for (const ch of chars) {
        const test = current + ch;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = ch;
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
      return lines.length ? lines : [text];
    }

    function renderRecommendations(recs) {
      const container = document.getElementById("recommendResult");
      const purposeText = document.getElementById("purposeInput").value.trim() || "봄날의 따뜻한 햇살처럼";

      let html = '<div class="results-title">✨ 추천 결과</div><div class="result-cards">';
      recs.forEach((rec, i) => {
        const font = FONT_DATA.find(f => f.id === rec.fontId);
        if (!font) return;
        const priceText = font.isFree ? "무료" : `${font.price.toLocaleString()}원`;
        const canvasId = `template-canvas-${i}`;
        html += `
          <div class="result-card">
            <div class="rank">✨ 추천 ${i + 1}</div>
            <div class="font-name">${escapeHtml(font.name)}</div>
            <div class="font-meta">${escapeHtml(font.category)} | ${priceText}</div>
            <div class="template-preview">
              <canvas id="${canvasId}" style="width:100%;border-radius:8px;"></canvas>
            </div>
            <div class="reason"><strong>📝 추천 이유</strong><br>${escapeHtml(rec.reason)}</div>
            <div class="usage"><strong>💡 활용 예시</strong><br>${escapeHtml(rec.usageExample)}</div>
            <a href="${font.shopUrl}" target="_blank" rel="noopener" class="buy-btn" aria-label="${font.name} 구매하기">🛒 구매하기 ${priceText}</a>
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;

      // Canvas 렌더링 (DOM 삽입 후)
      recs.forEach((rec, i) => {
        const font = FONT_DATA.find(f => f.id === rec.fontId);
        if (!font) return;
        const template = pickTemplate(font, rec.usageExample);
        drawTemplateCanvas(`template-canvas-${i}`, font, template, purposeText);
      });
    }

    // ── 미리보기 ──
    function initCategoryFilter() {
      const categories = [...new Set(FONT_DATA.map(f => f.category))];
      const select = document.getElementById("categoryFilter");
      categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function updateSize() {
      const val = document.getElementById("sizeSlider").value;
      document.getElementById("sizeValue").textContent = val + "px";
      renderPreviewList();
    }

    function renderPreviewList() {
      const text = document.getElementById("previewInput").value || "봄날의 따뜻한 햇살처럼";
      const category = document.getElementById("categoryFilter").value;
      const size = document.getElementById("sizeSlider").value;
      const freeOnly = document.getElementById("freeToggle").checked;

      let fonts = FONT_DATA.filter(f => {
        if (category !== "전체" && f.category !== category) return false;
        if (freeOnly && !f.isFree) return false;
        return true;
      });

      // 무료 상단 정렬
      fonts.sort((a, b) => (b.isFree ? 1 : 0) - (a.isFree ? 1 : 0));

      const container = document.getElementById("fontList");
      if (fonts.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:32px">조건에 맞는 폰트가 없습니다.</div>';
        return;
      }

      container.innerHTML = fonts.map(f => {
        const priceText = f.isFree ? "무료" : `${f.price.toLocaleString()}원`;
        return `
          <div class="font-item">
            <div class="font-item-header">
              <span class="font-item-name">${escapeHtml(f.name)}</span>
              <div class="font-item-badges">
                <span class="badge badge-category">${escapeHtml(f.category)}</span>
                ${f.isFree ? '<span class="badge badge-free">무료</span>' : ''}
              </div>
            </div>
            <div class="font-item-preview" style="font-family:'${f.previewFont}',sans-serif;font-size:${size}px">${escapeHtml(text)}</div>
            <div class="font-item-footer">
              <a href="${f.shopUrl}" target="_blank" rel="noopener" class="buy-btn-sm" aria-label="${f.name} 구매하기">🛒 ${priceText}</a>
            </div>
          </div>`;
      }).join("");
    }

    // ── 유틸 ──
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
