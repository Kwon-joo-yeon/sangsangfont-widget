<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상상토끼 폰틀리에 — AI 폰트 추천 & 미리보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Brush+Script&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #02bca7;
      --primary-dark: #019e8d;
      --bg: #ffffff;
      --bg-subtle: #f7fffe;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e0f5f3;
      --card-shadow: 0 2px 12px rgba(2, 188, 167, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    #fontelier-widget {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 헤더 */
    .widget-header {
      text-align: center;
      padding: 24px 0 16px;
    }
    .widget-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .widget-header h1 span { font-size: 1.6rem; }
    .widget-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* 사용 횟수 안내 */
    .usage-info {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .usage-info.warn { color: #e67e22; }
    .usage-info.exhausted { color: #dc2626; }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: none;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-btn:hover { color: var(--primary-dark); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 공통 입력 */
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .text-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary); }

    /* 태그 */
    .tags-section { margin-bottom: 16px; }
    .tags-section label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      transition: all 0.2s;
    }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tag-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* AI 추천 버튼 */
    .recommend-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .recommend-btn:hover { background: var(--primary-dark); }
    .recommend-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 추천 결과 */
    .results-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .result-cards { display: flex; flex-direction: column; gap: 16px; }
    .result-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--bg-subtle);
      box-shadow: var(--card-shadow);
    }
    .result-card .rank {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .result-card .font-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .result-card .font-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .result-card .preview-text {
      padding: 16px;
      background: #fff;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      min-height: 50px;
      line-height: 1.4;
    }
    .template-preview {
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .result-card .reason, .result-card .usage {
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .result-card .reason strong, .result-card .usage strong {
      color: var(--text-muted);
    }
    .buy-btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .buy-btn:hover { background: var(--primary-dark); }

    /* 에러 */
    .error-msg {
      padding: 16px;
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 16px;
    }

    /* 미리보기 탭 컨트롤 */
    .preview-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .preview-controls select,
    .preview-controls input[type="range"] {
      font-family: inherit;
    }
    .preview-controls select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      background: #fff;
    }
    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .range-wrap input[type="range"] {
      width: 100px;
      accent-color: var(--primary);
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .toggle-wrap input[type="checkbox"] { accent-color: var(--primary); }

    /* 폰트 목록 */
    .font-list { display: flex; flex-direction: column; gap: 12px; }
    .font-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      background: #fff;
      transition: box-shadow 0.2s;
    }
    .font-item:hover { box-shadow: var(--card-shadow); }
    .font-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .font-item-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .font-item-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .badge-category { background: var(--border); color: var(--primary-dark); }
    .badge-free { background: var(--primary); color: #fff; }
    .font-item-preview {
      margin: 8px 0;
      line-height: 1.4;
      word-break: keep-all;
    }
    .font-item-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .buy-btn-sm {
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .buy-btn-sm:hover { background: var(--primary-dark); }

    /* 비교 모드 */
    .compare-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .compare-chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      color: var(--text);
    }
    .compare-chip:hover { border-color: var(--primary); }
    .compare-chip.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .compare-chip.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .compare-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .compare-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .compare-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--card-shadow);
    }
    .compare-card-header {
      padding: 12px 16px;
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .compare-card-header .name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .compare-card-header .meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .compare-card-body {
      padding: 20px 16px;
    }
    .compare-preview-text {
      line-height: 1.5;
      word-break: keep-all;
      margin-bottom: 12px;
    }
    .compare-card-canvas {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .compare-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }
    .compare-card-tags .tag {
      padding: 2px 8px;
      background: var(--bg-subtle);
      border-radius: 4px;
      font-size: 0.7rem;
      color: var(--primary-dark);
    }
    .compare-card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .compare-card-footer .price {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--primary-dark);
    }
    .compare-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .compare-count {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* 갤러리 */
    .gallery-scenes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .scene-btn {
      padding: 8px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      color: var(--text);
    }
    .scene-btn:hover { border-color: var(--primary); color: var(--primary); }
    .scene-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .gallery-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gallery-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(2,188,167,0.18);
    }
    .gallery-card canvas {
      width: 100%;
      display: block;
    }
    .gallery-card-info {
      padding: 12px 14px;
    }
    .gallery-card-info .name {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }
    .gallery-card-info .desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .gallery-card-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .gallery-card-footer .price {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--primary-dark);
    }
    .gallery-scene-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .gallery-scene-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* 조합 추천 */
    .pairing-list { display: flex; flex-direction: column; gap: 20px; }
    .pairing-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--card-shadow);
    }
    .pairing-card-header {
      padding: 14px 18px;
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pairing-card-header .pair-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--primary-dark);
    }
    .pairing-card-header .pair-use {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .pairing-preview {
      padding: 24px 20px;
    }
    .pairing-preview-title {
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .pairing-preview-body {
      line-height: 1.8;
      color: #444;
    }
    .pairing-divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px;
    }
    .pairing-canvas-wrap {
      padding: 16px 20px;
    }
    .pairing-canvas-wrap canvas {
      width: 100%;
      border-radius: 8px;
    }
    .pairing-fonts {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
    }
    .pairing-font-info {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pairing-font-info:first-child {
      border-right: 1px solid var(--border);
    }
    .pairing-font-info .role {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
    }
    .pairing-font-info .fname {
      font-weight: 700;
      font-size: 0.88rem;
    }
    .pairing-font-info .fprice {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .pairing-font-info .fbuy {
      margin-top: 4px;
    }
    .pairing-total {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      background: var(--bg-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }
    .pairing-total .total-price {
      font-weight: 700;
      color: var(--primary-dark);
    }
    .pair-category-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* 반응형 */
    @media (max-width: 480px) {
      #fontelier-widget { padding: 12px; }
      .widget-header h1 { font-size: 1.2rem; }
      .result-cards { gap: 12px; }
      .result-card { padding: 14px; }
      .preview-controls { flex-direction: column; align-items: flex-start; }
      .range-wrap input[type="range"] { width: 140px; }
      .compare-grid.cols-2, .compare-grid.cols-3 { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: 1fr; }
      .pairing-fonts { flex-direction: column; }
      .pairing-font-info:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div id="fontelier-widget">
    <!-- 헤더 -->
    <div class="widget-header">
      <h1><span>🐰</span> 상상토끼 폰트 찾기</h1>
      <p>내게 맞는 폰트를 AI가 추천해드려요</p>
    </div>

    <!-- 남은 횟수 안내 -->
    <div class="usage-info" id="usageInfo"></div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('recommend')" aria-label="AI 추천 탭">🤖 AI 추천</button>
      <button class="tab-btn" onclick="switchTab('preview')" aria-label="미리보기 탭">🔤 미리보기</button>
      <button class="tab-btn" onclick="switchTab('compare')" aria-label="비교 탭">⚖️ 비교</button>
      <button class="tab-btn" onclick="switchTab('gallery')" aria-label="갤러리 탭">🎨 갤러리</button>
      <button class="tab-btn" onclick="switchTab('pairing')" aria-label="조합 탭">🔗 조합</button>
    </div>

    <!-- Tab 1: AI 추천 -->
    <div class="tab-content active" id="tab-recommend">
      <div class="input-group">
        <label for="purposeInput">어떤 용도로 사용하실 건가요?</label>
        <input type="text" class="text-input" id="purposeInput" placeholder="예) 카페 메뉴판에 쓸 따뜻하고 감성적인 폰트">
      </div>

      <div class="tags-section">
        <label>분위기 (다중 선택)</label>
        <div class="tags-wrap" id="moodTags"></div>
      </div>

      <div class="tags-section">
        <label>용도 (다중 선택)</label>
        <div class="tags-wrap" id="useTags"></div>
      </div>

      <button class="recommend-btn" id="recommendBtn" onclick="getRecommendation()" aria-label="AI 추천 받기">
        🤖 AI 추천 받기
      </button>

      <div id="recommendResult"></div>
    </div>

    <!-- Tab 2: 미리보기 -->
    <div class="tab-content" id="tab-preview">
      <div class="input-group">
        <label for="previewInput">미리볼 문장을 입력하세요</label>
        <input type="text" class="text-input" id="previewInput" value="봄날의 따뜻한 햇살처럼" oninput="renderPreviewList()">
      </div>

      <div class="preview-controls">
        <select id="categoryFilter" onchange="renderPreviewList()" aria-label="카테고리 필터">
          <option value="전체">전체</option>
        </select>
        <div class="range-wrap">
          <label for="sizeSlider">크기:</label>
          <input type="range" id="sizeSlider" min="24" max="72" value="40" oninput="updateSize()">
          <span id="sizeValue">40px</span>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="freeToggle" onchange="renderPreviewList()">
          무료만 보기
        </label>
      </div>

      <div class="font-list" id="fontList"></div>
    </div>

    <!-- Tab 3: 비교 -->
    <div class="tab-content" id="tab-compare">
      <div class="input-group">
        <label for="compareInput">비교할 문장을 입력하세요</label>
        <input type="text" class="text-input" id="compareInput" value="봄날의 따뜻한 햇살처럼" oninput="renderCompare()">
      </div>

      <div class="input-group">
        <label>비교할 폰트 선택 (최대 3개)</label>
        <div class="compare-count" id="compareCount"></div>
        <div class="compare-selector" id="compareSelector"></div>
      </div>

      <div class="range-wrap" style="margin-bottom:16px">
        <label for="compareSizeSlider">크기:</label>
        <input type="range" id="compareSizeSlider" min="24" max="72" value="36" oninput="updateCompareSize()">
        <span id="compareSizeValue">36px</span>
      </div>

      <div id="compareResult"></div>
    </div>

        if (data.date === today) return data;

    function pickTemplate(font, usageExample) {
      const text = (font.useCase.join(" ") + " " + font.tags.join(" ") + " " + (usageExample || "")).toLowerCase();
      if (text.includes("카페") || text.includes("메뉴")) return TEMPLATES["카페메뉴판"];
      if (text.includes("영화") || text.includes("포스터") || text.includes("시네마")) return TEMPLATES["영화포스터"];
      if (text.includes("sns") || text.includes("인스타")) return TEMPLATES["SNS카드"];
      if (text.includes("청첩") || text.includes("초대") || text.includes("카드")) return TEMPLATES["청첩장"];
      if (text.includes("웹툰") || text.includes("만화") || text.includes("효과")) return TEMPLATES["웹툰"];
      if (text.includes("브랜") || text.includes("로고") || text.includes("패션")) return TEMPLATES["브랜딩"];
      if (text.includes("교육") || text.includes("학습") || text.includes("키즈")) return TEMPLATES["교육자료"];
      return TEMPLATES["기본"];
    }

    function drawTemplateCanvas(canvasId, font, template, mainText) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width = 420;
      const h = canvas.height = 260;

      // 배경
      template.bg(ctx, w, h);

      // 메인 텍스트
      const fontSize = template === TEMPLATES["웹툰"] ? 28 : 26;
      ctx.font = `bold ${fontSize}px '${font.previewFont}', sans-serif`;
      ctx.fillStyle = template.textColor;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const lines = wrapText(ctx, mainText, w - 80);
      const lineHeight = fontSize * 1.4;
      const startY = h * template.textY - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, i) => {
        ctx.fillText(line, w / 2, startY + i * lineHeight);
      });

      // 부제
      if (template.subText) {
        ctx.font = "13px 'Noto Sans KR', sans-serif";
        ctx.fillStyle = template.subColor;
        const subLines = template.subText.split("\n");
        subLines.forEach((line, i) => {
          ctx.fillText(line, w / 2, h * template.textY + 50 + i * 20);
        });
      }

      // 폰트명 워터마크
      ctx.font = "11px 'Noto Sans KR', sans-serif";
      ctx.fillStyle = template.subColor;
      ctx.globalAlpha = 0.6;
      ctx.textAlign = "right";
      ctx.fillText(`Font: ${font.name}`, w - 20, h - 14);
      ctx.globalAlpha = 1;
    }

    function wrapText(ctx, text, maxWidth) {
      const chars = text.split("");
      const lines = [];
      let current = "";
      for (const ch of chars) {
        const test = current + ch;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = ch;
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
      return lines.length ? lines : [text];
    }

          { title: "인스타 감성 세트", use: "카드뉴스 + 캡션", heading: "jeongmuk-instablush", body: "little-school", sample: { h: "오늘의 기록", b: "작은 것에서 행복을 찾는 하루.\n일상이 곧 콘텐츠가 되는 순간들." } },
          { title: "유튜브 썸네일 세트", use: "제목 + 부제", heading: "sangsang-rocknroll", body: "taktak-clover", sample: { h: "이거 실화?!", b: "직접 해보고 알려드리는 솔직 리뷰\n구독자 여러분의 선택을 도와드립니다." } }
        ]
      },
      {
        category: "영화·포스터",
        pairs: [
          { title: "시네마틱 세트", use: "영화 제목 + 태그라인", heading: "taktak-625", body: "sangsang-myeongjo-r", sample: { h: "그해 여름의 끝", b: "잊혀진 약속, 되돌릴 수 없는 시간.\n2026년 여름, 극장에서 만나세요." } },
          { title: "할리우드 클래식 세트", use: "타이틀 + 크레딧", heading: "hollywood-regular", body: "taktak-topstar", sample: { h: "MIDNIGHT STAR", b: "황금기 할리우드의 감성을 담은\n클래식 무비 포스터 디자인." } }
        ]
      },
      {
        category: "청첩장·초대장",
        pairs: [
          { title: "엘레강스 세트", use: "이름 + 본문 안내", heading: "blackswan", body: "sangsang-myeongjo-r", sample: { h: "민준 ♥ 서연", b: "두 사람이 사랑으로 하나 되는 날\n소중한 분들을 초대합니다." } },
          { title: "감성 캘리 세트", use: "타이틀 + 안내문", heading: "jeongmuk-instablush", body: "sangsang-flowroad", sample: { h: "함께해주세요", b: "서로 다른 길을 걸어온 두 사람이\n같은 길을 걸어가려 합니다." } }
        ]
      },
      {
        category: "웹툰·게임",
        pairs: [
          { title: "액션 임팩트 세트", use: "효과음 + 대사", heading: "webtoon-kwang", body: "barbarian", sample: { h: "콰앙!!", b: "이 세계의 마지막 용사여,\n전설의 검을 들어라!" } },
          { title: "코믹 세트", use: "제목 + 나레이션", heading: "webtoon-hwareuruk", body: "shinbi-7", sample: { h: "화르륵!", b: "그날 학교에서 생긴 일은\n아무도 예상하지 못했다." } }
        ]
      },
      {
        category: "브랜딩·로고",
        pairs: [
          { title: "프리미엄 브랜드 세트", use: "브랜드명 + 슬로건", heading: "blackswan", body: "sangsang-myeongjo-r", sample: { h: "MAISON NOIR", b: "당신만의 특별한 순간을 위한\n프리미엄 라이프스타일 브랜드." } },
          { title: "전통 브랜드 세트", use: "상호 + 소개문", heading: "jeongmuk-baui", body: "sangsang-myeongjo-r", sample: { h: "묵향헌", b: "삼대째 이어온 장인의 손맛,\n전통과 정성을 담아 전합니다." } }
        ]
      },
      {
        category: "교육·키즈",
        pairs: [
          { title: "어린이 학습 세트", use: "제목 + 설명문", heading: "shinbi-7", body: "yerin-7", sample: { h: "즐거운 한글 놀이", b: "가나다라마바사!\n오늘도 재미있게 글자를 배워봐요." } },
          { title: "교육 자료 세트", use: "단원명 + 본문", heading: "sangsang-rocknroll", body: "little-school", sample: { h: "3단원. 우리 마을", b: "우리가 사는 마을에는 어떤 곳이 있을까요?\n함께 탐험하며 알아봅시다." } }
        ]
      }
    ];

    let currentPairCategory = "전체";

    function getAllPairs() {
      const all = [];
      PAIRINGS.forEach(p => { if (p.pairs) all.push(...p.pairs); });
      return all;
    }

    function renderPairing() {
      const btnsEl = document.getElementById("pairCategoryBtns");
      btnsEl.innerHTML = PAIRINGS.map(p =>
        `<button class="scene-btn${p.category === currentPairCategory ? " active" : ""}" onclick="selectPairCategory('${p.category}')">${p.category}</button>`
      ).join("");
      renderPairingList();
    }

    function selectPairCategory(cat) {
      currentPairCategory = cat;
      renderPairing();
    }

    function renderPairingList() {
      const container = document.getElementById("pairingList");
      const pairs = currentPairCategory === "전체" ? getAllPairs() : (PAIRINGS.find(p => p.category === currentPairCategory)?.pairs || []);

      let html = "";
      pairs.forEach((pair, i) => {
        const hFont = FONT_DATA.find(f => f.id === pair.heading);
        const bFont = FONT_DATA.find(f => f.id === pair.body);
        if (!hFont || !bFont) return;

        const hPrice = hFont.isFree ? "무료" : `${hFont.price.toLocaleString()}원`;
        const bPrice = bFont.isFree ? "무료" : `${bFont.price.toLocaleString()}원`;
        const totalPrice = (hFont.isFree ? 0 : hFont.price) + (bFont.isFree ? 0 : bFont.price);
        const totalText = totalPrice === 0 ? "모두 무료!" : `세트 합계 ${totalPrice.toLocaleString()}원`;
        const canvasId = `pairing-canvas-${i}`;
        const bodyLines = pair.sample.b.split("\n").map(l => escapeHtml(l)).join("<br>");

        html += `
          <div class="pairing-card">
            <div class="pairing-card-header">
              <span class="pair-label">${escapeHtml(pair.title)}</span>
              <span class="pair-use">${escapeHtml(pair.use)}</span>
            </div>
            <div class="pairing-preview">
              <div class="pairing-preview-title" style="font-family:'${hFont.previewFont}',sans-serif;font-size:28px;font-weight:bold">${escapeHtml(pair.sample.h)}</div>
              <div class="pairing-preview-body" style="font-family:'${bFont.previewFont}',sans-serif;font-size:16px">${bodyLines}</div>
            </div>
            <div class="pairing-divider"></div>
            <div class="pairing-canvas-wrap">
              <canvas id="${canvasId}"></canvas>
            </div>
            <div class="pairing-fonts">
              <div class="pairing-font-info">
                <span class="role">제목용</span>
                <span class="fname">${escapeHtml(hFont.name)}</span>
                <span class="fprice">${hFont.isFree ? "🆓 무료" : "💰 " + hPrice}</span>
                <a href="${hFont.shopUrl}" target="_blank" rel="noopener" class="buy-btn-sm fbuy">구매하기</a>
              </div>
              <div class="pairing-font-info">
                <span class="role">본문용</span>
                <span class="fname">${escapeHtml(bFont.name)}</span>
                <span class="fprice">${bFont.isFree ? "🆓 무료" : "💰 " + bPrice}</span>
                <a href="${bFont.shopUrl}" target="_blank" rel="noopener" class="buy-btn-sm fbuy">구매하기</a>
              </div>
            </div>
            <div class="pairing-total">
              <span>세트 구매 시</span>
              <span class="total-price">${totalText}</span>
            </div>
          </div>`;
      });
      container.innerHTML = html;

      // Canvas 렌더링
      pairs.forEach((pair, i) => {
        const hFont = FONT_DATA.find(f => f.id === pair.heading);
        if (!hFont) return;
        const template = pickTemplate(hFont, pair.use);
        drawPairingCanvas(`pairing-canvas-${i}`, pair, hFont, FONT_DATA.find(f => f.id === pair.body), template);
      });
    }

    function drawPairingCanvas(canvasId, pair, hFont, bFont, template) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width = 420;
      const h = canvas.height = 280;

      template.bg(ctx, w, h);

      // 제목
      ctx.font = `bold 30px '${hFont.previewFont}', sans-serif`;
      ctx.fillStyle = template.textColor;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(pair.sample.h, w / 2, h * 0.35);

      // 본문
      ctx.font = `15px '${bFont.previewFont}', sans-serif`;
      ctx.fillStyle = template.subColor || template.textColor;
      ctx.globalAlpha = 0.85;
      const bodyLines = pair.sample.b.split("\n");
      bodyLines.forEach((line, i) => {
        ctx.fillText(line, w / 2, h * 0.55 + i * 22);
      });
      ctx.globalAlpha = 1;

      // 폰트명
      ctx.font = "10px 'Noto Sans KR', sans-serif";
      ctx.fillStyle = template.subColor || template.textColor;
      ctx.globalAlpha = 0.5;
      ctx.textAlign = "right";
      ctx.fillText(`${hFont.name} + ${bFont.name}`, w - 16, h - 12);
      ctx.globalAlpha = 1;
    }

    // ── 유틸 ──
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
